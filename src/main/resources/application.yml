spring:
  application:
    name: InfiniteChat-Agent
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ttl: ${REDIS_TTL:3600}
      timeout: ${REDIS_TIMEOUT:30000}
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true


server:
  port: 10010
  servlet:
    context-path: /api


logging:
  level:
    dev.langchain4j.mcp: ERROR

pgvector:
  database: ${PGVECTOR_DATABASE:dp}
  host: ${PGVECTOR_HOST:localhost}
  port : ${PGVECTOR_PORT:5432}
  user: ${PGVECTOR_USER:postgres}
  password: ${PGVECTOR_PASSWORD:}
  table: ${PGVECTOR_TABLE:dp_embedding}

langchain4j:
  community:
    dashscope:
      chat-model:
        model-name: ${DASHSCOPE_CHAT_MODEL:qwen-plus}
        api-key: ${DASHSCOPE_API_KEY:}
      embedding-model:
        model-name: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
        api-key: ${DASHSCOPE_API_KEY:}
      streaming-chat-model:
        model-name: ${DASHSCOPE_STREAMING_MODEL:qwen-plus}
        api-key: ${DASHSCOPE_API_KEY:}

bigmodel:
  api-key: ${BIGMODEL_API_KEY:}

rag:
  docs-path: ${RAG_DOCS_PATH:E:\Java\Agent\InfiniteChat-Agent\src\main\resources\docs}
  retrieval:
    vector-results: 20
    keyword-results: 20
    candidate-results: 20
  rerank:
    enabled: true
    top-k: 5
  citation:
    min-score: 0.75
    snippet-max-chars: 500
    max-output-tokens: 500
  token:
    max-input-tokens: 1800
    reserved-system-tokens: 300
    min-chunk-chars: 180
    chars-per-token: 2.0

agent:
  react:
    max-output-tokens: 500
    memory-max-messages: 20
    planner:
      mode: ${AGENT_REACT_PLANNER_MODE:LLM}
      max-output-tokens: 300

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
