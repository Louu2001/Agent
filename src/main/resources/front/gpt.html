<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千言·AI智能助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f4f6f8;
            --sidebar-bg: #eef1f5;
            --panel-bg: #ffffff;
            --border: #dde2ea;
            --text-primary: #1a2333;
            --text-secondary: #6b7a90;
            --text-muted: #9aa5b4;
            --accent: #4a90d9;
            --accent-hover: #3578c4;
            --accent-light: #e8f1fb;
            --user-bubble: #4a90d9;
            --user-bubble-text: #ffffff;
            --ai-bubble: #ffffff;
            --ai-bubble-text: #1a2333;
            --input-bg: #f9fafb;
            --scrollbar: #c8d0db;
            --shadow: 0 2px 12px rgba(0,0,0,0.07);
            --shadow-md: 0 4px 24px rgba(0,0,0,0.10);
            --session-hover: #e2e8f2;
            --session-active: #d5e3f5;
            --session-active-border: #4a90d9;
            --delete-btn: #b0bac8;
            --delete-btn-hover: #e05c5c;
            --typing-dot: #9aa5b4;
        }

        [data-theme="dark"] {
            --bg: #131820;
            --sidebar-bg: #161d28;
            --panel-bg: #1e2736;
            --border: #2a3547;
            --text-primary: #e2e8f0;
            --text-secondary: #8fa0b8;
            --text-muted: #5a6d84;
            --accent: #5ba0e8;
            --accent-hover: #4a90d9;
            --accent-light: #1e2e42;
            --user-bubble: #2d5a8e;
            --user-bubble-text: #e8f1fb;
            --ai-bubble: #253044;
            --ai-bubble-text: #dce8f5;
            --input-bg: #1a2336;
            --scrollbar: #2d3f57;
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 24px rgba(0,0,0,0.4);
            --session-hover: #1e2d42;
            --session-active: #1f3355;
            --session-active-border: #5ba0e8;
            --delete-btn: #4a5d73;
            --delete-btn-hover: #d95555;
            --typing-dot: #5a7a9a;
        }

        html, body {
            height: 100%;
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }

        #app {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ─── SIDEBAR ─── */
        #sidebar {
            width: 260px;
            min-width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: background 0.3s, border-color 0.3s;
        }

        #brand {
            padding: 22px 20px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: linear-gradient(135deg, #4a90d9 0%, #7ab8f5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(74,144,217,0.35);
        }

        .brand-icon svg { width: 18px; height: 18px; fill: white; }

        .brand-text {
            font-family: 'Noto Serif SC', serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        .brand-sub {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 300;
            letter-spacing: 1px;
        }

        #new-chat-btn {
            margin: 14px 14px 10px;
            padding: 10px 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 2px 8px rgba(74,144,217,0.3);
            letter-spacing: 0.3px;
        }

        #new-chat-btn:hover { background: var(--accent-hover); box-shadow: 0 4px 14px rgba(74,144,217,0.4); }
        #new-chat-btn:active { transform: scale(0.98); }
        #new-chat-btn svg { width: 15px; height: 15px; fill: none; stroke: white; stroke-width: 2.2; stroke-linecap: round; }

        #session-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 10px 16px;
        }

        #session-list::-webkit-scrollbar { width: 4px; }
        #session-list::-webkit-scrollbar-track { background: transparent; }
        #session-list::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

        .session-label {
            font-size: 10.5px;
            color: var(--text-muted);
            letter-spacing: 1.2px;
            text-transform: uppercase;
            padding: 10px 8px 6px;
            font-weight: 500;
        }

        .session-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 10px;
            border-radius: 9px;
            cursor: pointer;
            transition: background 0.15s;
            border-left: 2.5px solid transparent;
            margin-bottom: 2px;
        }

        .session-item:hover { background: var(--session-hover); }
        .session-item.active {
            background: var(--session-active);
            border-left-color: var(--session-active-border);
        }

        .session-title {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .session-item.active .session-title { color: var(--text-primary); font-weight: 500; }

        .session-icon {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
            opacity: 0.5;
        }

        .session-delete {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--delete-btn);
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s;
            flex-shrink: 0;
            line-height: 1;
            opacity: 0;
            transition: opacity 0.15s, color 0.15s, background 0.15s;
        }

        .session-item:hover .session-delete { opacity: 1; }
        .session-delete:hover { background: rgba(224,92,92,0.12); color: var(--delete-btn-hover); }

        /* Theme toggle at bottom of sidebar */
        #sidebar-footer {
            padding: 12px 14px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        #theme-toggle {
            width: 36px;
            height: 20px;
            border-radius: 10px;
            background: var(--border);
            border: none;
            cursor: pointer;
            position: relative;
            transition: background 0.3s;
            padding: 0;
            display: flex;
            align-items: center;
        }

        #theme-toggle.dark { background: var(--accent); }

        .toggle-knob {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: white;
            position: absolute;
            left: 3px;
            transition: left 0.25s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
        }

        #theme-toggle.dark .toggle-knob { left: 19px; }

        /* ─── MAIN AREA ─── */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            overflow: hidden;
            transition: background 0.3s;
        }

        #chat-header {
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow);
            transition: background 0.3s, border-color 0.3s;
            z-index: 10;
            flex-shrink: 0;
        }

        #active-session-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            font-family: 'Noto Serif SC', serif;
        }

        #active-session-id {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: 4px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #4caf7d;
            box-shadow: 0 0 0 2px rgba(76,175,125,0.25);
            flex-shrink: 0;
            margin-left: auto;
        }

        /* ─── MESSAGES ─── */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #messages::-webkit-scrollbar { width: 5px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            animation: fadeUp 0.25s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-row.user { flex-direction: row-reverse; }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            flex-shrink: 0;
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }

        .bubble {
            max-width: 68%;
            padding: 11px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.7;
            word-break: break-word;
            white-space: pre-wrap;
            position: relative;
            box-shadow: var(--shadow);
            transition: background 0.3s, color 0.3s;
        }

        .msg-row.ai .bubble {
            background: var(--ai-bubble);
            color: var(--ai-bubble-text);
            border-bottom-left-radius: 4px;
        }

        .msg-row.user .bubble {
            background: var(--user-bubble);
            color: var(--user-bubble-text);
            border-bottom-right-radius: 4px;
        }

        .msg-time {
            font-size: 10.5px;
            color: var(--text-muted);
            margin-top: 4px;
            padding: 0 4px;
        }

        .msg-row.ai .msg-meta { align-self: flex-end; text-align: left; }
        .msg-row.user .msg-meta { align-self: flex-end; text-align: right; }

        .msg-col { display: flex; flex-direction: column; gap: 3px; }
        .msg-row.user .msg-col { align-items: flex-end; }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 14px 16px;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: var(--typing-dot);
            border-radius: 50%;
            animation: typingBounce 1.2s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Empty state */
        #empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            opacity: 0.5;
            padding-bottom: 60px;
            pointer-events: none;
        }

        .empty-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: var(--accent-light);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-icon svg { width: 26px; height: 26px; stroke: var(--accent); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
        .empty-title { font-family: 'Noto Serif SC', serif; font-size: 15px; color: var(--text-secondary); }
        .empty-sub { font-size: 12.5px; color: var(--text-muted); }

        /* ─── INPUT AREA ─── */
        #input-area {
            background: var(--panel-bg);
            border-top: 1px solid var(--border);
            padding: 16px 24px 18px;
            transition: background 0.3s, border-color 0.3s;
            flex-shrink: 0;
        }

        #input-wrap {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 10px 12px 10px 16px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
        }

        #input-wrap:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(74,144,217,0.12);
        }

        #prompt-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 24px;
            max-height: 150px;
            overflow-y: auto;
        }

        #prompt-input::placeholder { color: var(--text-muted); }

        #prompt-input::-webkit-scrollbar { width: 3px; }
        #prompt-input::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

        #send-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s, opacity 0.2s;
            flex-shrink: 0;
        }

        #send-btn:hover { background: var(--accent-hover); }
        #send-btn:active { transform: scale(0.93); }
        #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        #send-btn svg { width: 17px; height: 17px; fill: none; stroke: white; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

        #input-hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 7px;
            text-align: right;
            letter-spacing: 0.2px;
        }
    </style>
</head>
<body>
<div id="app">
    <!-- SIDEBAR -->
    <div id="sidebar">
        <div id="brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
            </div>
            <div>
                <div class="brand-text">千言·AI智能助手</div>
                <div class="brand-sub">QIANYAN ASSISTANT</div>
            </div>
        </div>

        <button id="new-chat-btn">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            新建聊天
        </button>

        <div id="session-list">
            <div class="session-label">会话记录</div>
        </div>

        <div id="sidebar-footer">
            <span class="footer-label" id="theme-label">☀️ 白天模式</span>
            <button id="theme-toggle">
                <div class="toggle-knob">☀️</div>
            </button>
        </div>
    </div>

    <!-- MAIN -->
    <div id="main">
        <div id="chat-header">
            <div>
                <span id="active-session-title">千言·AI智能助手</span>
                <span id="active-session-id"></span>
            </div>
            <div class="status-dot"></div>
        </div>

        <div id="messages">
            <div id="empty-state">
                <div class="empty-icon">
                    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </div>
                <div class="empty-title">开始一段对话</div>
                <div class="empty-sub">在下方输入框中输入内容，然后按 Enter 发送</div>
            </div>
        </div>

        <div id="input-area">
            <div id="input-wrap">
                <textarea id="prompt-input" rows="1" placeholder="输入消息… (Enter 发送，Shift+Enter 换行)"></textarea>
                <button id="send-btn">
                    <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
            <div id="input-hint">Enter 发送 · Shift+Enter 换行</div>
        </div>
    </div>
</div>

<script>
    // ─── AVATARS (SVG-based, inline) ───
    const AI_AVATAR = `data:image/svg+xml;utf8,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#7ab8f5"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="32" fill="url(#bg)"/>
  <circle cx="32" cy="26" r="9" fill="white" opacity="0.95"/>
  <path d="M14 52 Q14 40 32 40 Q50 40 50 52" fill="white" opacity="0.95"/>
  <circle cx="26" cy="25" r="2" fill="#4a90d9"/>
  <circle cx="38" cy="25" r="2" fill="#4a90d9"/>
  <path d="M27 30 Q32 34 37 30" stroke="#4a90d9" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>`)}`;

    const USER_AVATAR = `data:image/svg+xml;utf8,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="ug" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5aabaa"/>
      <stop offset="100%" style="stop-color:#88cfc8"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="32" fill="url(#ug)"/>
  <circle cx="32" cy="26" r="9" fill="white" opacity="0.95"/>
  <path d="M14 52 Q14 40 32 40 Q50 40 50 52" fill="white" opacity="0.95"/>
  <circle cx="27" cy="25" r="2" fill="#5aabaa"/>
  <circle cx="37" cy="25" r="2" fill="#5aabaa"/>
  <path d="M27 30 Q32 33 37 30" stroke="#5aabaa" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>`)}`;

    // ─── STATE ───
    let sessions = [];          // [{id, messages:[]}]
    let activeSessionId = null;
    let abortController = null;
    let isStreaming = false;

    // userId: persistent
    let userId = parseInt(localStorage.getItem('qy_userId') || '0');
    if (!userId || userId < 100000) {
        userId = Math.floor(Math.random() * 900000) + 100000;
        localStorage.setItem('qy_userId', userId.toString());
    }

    function randId() {
        return Math.floor(Math.random() * 900000) + 100000;
    }

    // ─── THEME ───
    const themeToggle = document.getElementById('theme-toggle');
    const themeLabel = document.getElementById('theme-label');

    function applyTheme(dark) {
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : '');
        themeToggle.className = dark ? 'dark' : '';
        themeLabel.textContent = dark ? '🌙 夜间模式' : '☀️ 白天模式';
        themeToggle.querySelector('.toggle-knob').textContent = dark ? '🌙' : '☀️';
    }

    let isDark = localStorage.getItem('qy_theme') === 'dark';
    applyTheme(isDark);

    themeToggle.addEventListener('click', () => {
        isDark = !isDark;
        localStorage.setItem('qy_theme', isDark ? 'dark' : 'light');
        applyTheme(isDark);
    });

    // ─── SESSION MANAGEMENT ───
    function createSession() {
        abortCurrentStream();
        const id = randId();
        sessions.push({ id, messages: [] });
        renderSessionList();
        switchSession(id);
        return id;
    }

    function deleteSession(id) {
        const wasActive = id === activeSessionId;

        if (wasActive) abortCurrentStream();

        sessions = sessions.filter(s => s.id !== id);
        renderSessionList();

        if (wasActive) {
            if (sessions.length > 0) {
                switchSession(sessions[sessions.length - 1].id);
            } else {
                createSession();
            }
        }
    }

    function switchSession(id) {
        if (id !== activeSessionId) abortCurrentStream();
        activeSessionId = id;
        renderSessionList();
        renderMessages();
        updateHeader();
    }

    function getActiveSession() {
        return sessions.find(s => s.id === activeSessionId) || null;
    }

    function abortCurrentStream() {
        if (abortController) {
            abortController.abort();
            abortController = null;
        }
        isStreaming = false;
    }

    // ─── RENDER SESSION LIST ───
    function renderSessionList() {
        const list = document.getElementById('session-list');
        list.innerHTML = '<div class="session-label">会话记录</div>';

        sessions.slice().reverse().forEach(sess => {
            const item = document.createElement('div');
            item.className = 'session-item' + (sess.id === activeSessionId ? ' active' : '');
            item.dataset.id = sess.id;

            const title = document.createElement('div');
            title.className = 'session-title';
            title.innerHTML = `<svg class="session-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      会话 #${sess.id}`;

            const del = document.createElement('button');
            del.className = 'session-delete';
            del.title = '删除会话';
            del.innerHTML = '×';
            del.addEventListener('click', e => { e.stopPropagation(); deleteSession(sess.id); });

            item.appendChild(title);
            item.appendChild(del);
            item.addEventListener('click', () => switchSession(sess.id));
            list.appendChild(item);
        });
    }

    // ─── RENDER MESSAGES ───
    function renderMessages() {
        const container = document.getElementById('messages');
        container.innerHTML = '';

        const sess = getActiveSession();
        if (!sess || sess.messages.length === 0) {
            container.innerHTML = `
      <div id="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <div class="empty-title">开始一段对话</div>
        <div class="empty-sub">在下方输入框中输入内容，然后按 Enter 发送</div>
      </div>`;
            return;
        }

        sess.messages.forEach(msg => {
            container.appendChild(buildMessageEl(msg));
        });

        scrollToBottom();
    }

    function buildMessageEl(msg) {
        const row = document.createElement('div');
        row.className = `msg-row ${msg.role}`;
        row.dataset.msgId = msg.id;

        const avatar = document.createElement('img');
        avatar.className = 'avatar';
        avatar.src = msg.role === 'ai' ? AI_AVATAR : USER_AVATAR;
        avatar.alt = msg.role === 'ai' ? 'AI' : '用户';

        const col = document.createElement('div');
        col.className = 'msg-col';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';

        if (msg.typing) {
            bubble.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
        } else {
            bubble.textContent = msg.content;
        }

        const meta = document.createElement('div');
        meta.className = 'msg-meta';
        const time = document.createElement('div');
        time.className = 'msg-time';
        time.textContent = formatTime(msg.time);
        meta.appendChild(time);

        col.appendChild(bubble);
        col.appendChild(meta);
        row.appendChild(avatar);
        row.appendChild(col);
        return row;
    }

    function updateMessageBubble(msgId, content, typing = false) {
        const row = document.querySelector(`[data-msg-id="${msgId}"]`);
        if (!row) return;
        const bubble = row.querySelector('.bubble');
        if (!bubble) return;
        if (typing) {
            bubble.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
        } else {
            bubble.textContent = content;
        }
    }

    function updateHeader() {
        const sess = getActiveSession();
        document.getElementById('active-session-title').textContent = '千言·AI智能助手';
        document.getElementById('active-session-id').textContent = sess ? `· #${sess.id}` : '';
    }

    function scrollToBottom() {
        const c = document.getElementById('messages');
        c.scrollTop = c.scrollHeight;
    }

    function formatTime(ts) {
        const d = new Date(ts);
        return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }

    // ─── SEND MESSAGE ───
    async function sendMessage() {
        const sess = getActiveSession();
        if (!sess || isStreaming) return;

        const input = document.getElementById('prompt-input');
        const prompt = input.value.trim();
        if (!prompt) return;

        input.value = '';
        autoResize(input);

        // Add user message
        const userMsg = { id: randId(), role: 'user', content: prompt, time: Date.now() };
        sess.messages.push(userMsg);

        // Add AI placeholder
        const aiMsgId = randId();
        const aiMsg = { id: aiMsgId, role: 'ai', content: '', time: Date.now(), typing: true };
        sess.messages.push(aiMsg);

        renderMessages();
        setSendDisabled(true);
        isStreaming = true;

        abortController = new AbortController();

        try {
            const resp = await fetch('http://localhost:10010/api/streamChat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: sess.id, userId, prompt }),
                signal: abortController.signal,
            });

            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let accumulated = '';

            // Mark as no longer typing (streaming starts)
            aiMsg.typing = false;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split('\n');

                for (const line of lines) {
                    if (line.startsWith('data:')) {
                        const text = line.slice(5).trim();
                        if (text === '[DONE]') continue;
                        accumulated += text;
                    } else if (line.trim() && !line.startsWith(':') && !line.startsWith('event:')) {
                        accumulated += line;
                    }
                }

                aiMsg.content = accumulated;
                updateMessageBubble(aiMsgId, accumulated);
                scrollToBottom();
            }

            if (!accumulated) {
                aiMsg.content = '（未收到回复）';
                updateMessageBubble(aiMsgId, aiMsg.content);
            }

        } catch (err) {
            if (err.name === 'AbortError') {
                // Stream was aborted — leave current state
            } else {
                aiMsg.typing = false;
                aiMsg.content = `请求出错：${err.message}`;
                updateMessageBubble(aiMsgId, aiMsg.content);
            }
        } finally {
            isStreaming = false;
            abortController = null;
            setSendDisabled(false);
            scrollToBottom();
        }
    }

    function setSendDisabled(disabled) {
        document.getElementById('send-btn').disabled = disabled;
    }

    // ─── INPUT HANDLING ───
    const promptInput = document.getElementById('prompt-input');

    promptInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    promptInput.addEventListener('input', () => autoResize(promptInput));

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 150) + 'px';
    }

    document.getElementById('send-btn').addEventListener('click', sendMessage);
    document.getElementById('new-chat-btn').addEventListener('click', createSession);

    // ─── INIT ───
    createSession();
</script>
</body>
